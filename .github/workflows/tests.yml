name: tests

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        run: pytest -q

      - name: Smoke test CLI
        run: |
          export VENVWIN_HOME="$RUNNER_TEMP/venvwin"
          mkdir -p "$RUNNER_TEMP/installers"
          touch "$RUNNER_TEMP/installers/setup.exe"
          venvwin init
          venvwin first-run --home "$RUNNER_TEMP/home"
          venvwin first-run --home "$RUNNER_TEMP/home" --wizard-text
          venvwin first-run --home "$RUNNER_TEMP/home" --json
          venvwin storage
          venvwin storage --json
          venvwin doctor
          venvwin doctor --json
          venvwin associate --applications-dir "$RUNNER_TEMP/applications"
          venvwin create "Notepad Plus Plus"
          venvwin list
          venvwin inspect notepad-plus-plus
          venvwin install-command notepad-plus-plus setup.exe
          venvwin install notepad-plus-plus "$RUNNER_TEMP/installers/setup.exe" --dry-run
          venvwin open "$RUNNER_TEMP/installers/setup.exe" --dry-run
          venvwin launcher create notepad-plus-plus "Notepad Plus Plus" "C:\\Program Files\\Notepad++\\notepad++.exe"
          venvwin snapshot create notepad-plus-plus --label smoke
          venvwin reset notepad-plus-plus

      - name: Pre-ISO readiness gate
        run: |
          chmod +x winux-portable/pre-iso-readiness.sh
          ./winux-portable/pre-iso-readiness.sh
