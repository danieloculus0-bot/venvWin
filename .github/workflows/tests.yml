name: tests

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        run: pytest -q

      - name: Smoke test CLI
        run: |
          export VENVWIN_HOME="$RUNNER_TEMP/venvwin"
          venvwin init
          venvwin create "Notepad Plus Plus"
          venvwin list
          venvwin inspect notepad-plus-plus
          venvwin install-command notepad-plus-plus setup.exe
