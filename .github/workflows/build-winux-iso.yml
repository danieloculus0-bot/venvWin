name: build-winux-iso

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "WinUx package profile"
        required: true
        default: "standard"
        type: choice
        options:
          - core
          - standard
          - privacy
      qemu_smoke:
        description: "Run QEMU boot smoke test"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    paths:
      - "winux-portable/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/build-winux-iso.yml"

jobs:
  iso:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.profile)) || fromJSON('["core","standard","privacy"]') }}
    env:
      WINUX_PROFILE: ${{ matrix.profile }}
      QEMU_SMOKE: ${{ github.event.inputs.qemu_smoke || 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install live-build and virtual test tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build rsync xorriso isolinux syslinux-common squashfs-tools qemu-system-x86 ovmf

      - name: Build WinUx Portable ISO
        run: |
          chmod +x winux-portable/build-iso.sh
          ./winux-portable/build-iso.sh

      - name: Static ISO inspection
        run: |
          ISO="dist/winux-portable-alpha-${WINUX_PROFILE}.iso"
          test -f "$ISO"
          test -f "$ISO.sha256"
          sha256sum -c "$ISO.sha256"
          cat "dist/winux-portable-alpha-${WINUX_PROFILE}-manifest.txt"
          xorriso -indev "$ISO" -report_el_torito as_mkisofs
          xorriso -indev "$ISO" -find / -name filesystem.squashfs -print | grep filesystem.squashfs
          xorriso -indev "$ISO" -find / -name vmlinuz -print | head -n 1
          xorriso -indev "$ISO" -find / -name initrd.img -print | head -n 1

      - name: QEMU boot smoke test
        if: env.QEMU_SMOKE == 'true'
        run: |
          ISO="dist/winux-portable-alpha-${WINUX_PROFILE}.iso"
          set +e
          timeout 150s qemu-system-x86_64 \
            -m 2048 \
            -smp 2 \
            -cdrom "$ISO" \
            -boot d \
            -display none \
            -serial mon:stdio \
            -no-reboot \
            -net none
          code=$?
          set -e
          if [ "$code" -eq 124 ]; then
            echo "QEMU stayed alive for 150 seconds. Boot smoke passed enough for alpha learing."
            exit 0
          fi
          echo "QEMU exited early with code $code. ISO may be cursed."
          exit "$code"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: winux-portable-alpha-${{ env.WINUX_PROFILE }}-iso
          path: |
            dist/winux-portable-alpha-${{ env.WINUX_PROFILE }}.iso
            dist/winux-portable-alpha-${{ env.WINUX_PROFILE }}.iso.sha256
            dist/winux-portable-alpha-${{ env.WINUX_PROFILE }}-manifest.txt
          if-no-files-found: error
