name: flash-ready-standard

on:
  workflow_dispatch:
  push:
    paths:
      - "README.md"
      - "docs/**"
      - "venvwin-portable/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/flash-ready-standard.yml"

jobs:
  flash-ready-standard:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Install ISO build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build rsync xorriso isolinux syslinux-common squashfs-tools qemu-system-x86 ovmf

      - name: Run flash-ready standard gate
        id: flash_gate
        continue-on-error: true
        run: |
          echo "flash-ready-standard trigger: v3"
          chmod +x venvwin-portable/pre-iso-readiness.sh
          chmod +x venvwin-portable/build-iso.sh
          chmod +x venvwin-portable/build-flash-ready-standard.sh
          ./venvwin-portable/build-flash-ready-standard.sh

      - name: Upload flash-ready ISO artifacts
        if: steps.flash_gate.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: venvwin-portable-flash-ready-standard
          path: |
            dist/venvwin-portable-alpha-standard.iso
            dist/venvwin-portable-alpha-standard.iso.sha256
            dist/venvwin-portable-alpha-standard-manifest.txt
            dist/venvwin-flash-ready-verdict.txt
          if-no-files-found: error

      - name: Upload flash-ready diagnostics on failure
        if: always() && steps.flash_gate.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: venvwin-portable-flash-ready-standard-diagnostics
          path: |
            dist/venvwin-portable-alpha-standard.iso
            dist/venvwin-portable-alpha-standard.iso.sha256
            dist/venvwin-portable-alpha-standard-manifest.txt
            dist/venvwin-flash-ready-verdict.txt
            /tmp/venvwin-*.txt
            /tmp/venvwin-*.log
          if-no-files-found: warn

      - name: Fail when flash-ready gate failed
        if: steps.flash_gate.outcome != 'success'
        run: |
          if [ -f dist/venvwin-flash-ready-verdict.txt ]; then
            cat dist/venvwin-flash-ready-verdict.txt
          fi
          exit 1
