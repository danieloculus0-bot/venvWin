name: preflight-lite

on:
  workflow_dispatch:
  push:
    paths:
      - "README.md"
      - "docs/**"
      - "venvwin-portable/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/preflight-lite.yml"

jobs:
  preflight-lite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Shell syntax checks
        run: |
          bash -n venvwin-portable/audit-public-branding.sh
          bash -n venvwin-portable/pre-iso-readiness.sh
          bash -n venvwin-portable/build-iso.sh
          bash -n venvwin-portable/build-flash-ready-standard.sh
          bash -n venvwin-portable/test-iso-qemu.sh
          bash -n venvwin-portable/test-persistence-qemu.sh

      - name: Public branding audit
        run: |
          chmod +x venvwin-portable/audit-public-branding.sh
          ./venvwin-portable/audit-public-branding.sh

      - name: Python tests
        run: |
          python -m pytest -q
